name: soha

services:
  postgres:
    # Existing PostgreSQL 16 volumes must be migrated or recreated before using 18.4.
    image: postgres:18.4
    container_name: pgsql
    environment:
      POSTGRES_DB: soha
      POSTGRES_USER: pgsql
      POSTGRES_PASSWORD: pgsql
    ports:
      - "5432:5432"
    volumes:
      - soha-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgsql -d soha"]
      interval: 5s
      timeout: 5s
      retries: 20

  k3s:
    image: rancher/k3s:v1.36.0-k3s1
    container_name: soha-k3s
    privileged: true
    command:
      - server
      - --node-name=local-k3s
      - --disable=traefik
      - --disable=servicelb
      - --tls-san=127.0.0.1
    ports:
      - "6443:6443"
    volumes:
      - soha-k3s-data:/var/lib/rancher/k3s
      - ./configs/k3s/registries.yaml:/etc/rancher/k3s/registries.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "kubectl get nodes >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30

  soha:
    container_name: soha
    build:
      context: .
      dockerfile: Dockerfile
    image: soha:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SOHA_CONFIG_FILE: /app/configs/config.yaml
      SOHA_DATABASE_HOST: postgres
      SOHA_DATABASE_PORT: "5432"
      SOHA_DATABASE_NAME: soha
      SOHA_DATABASE_USER: pgsql
      SOHA_DATABASE_PASSWORD: pgsql
      SOHA_DATABASE_SSLMODE: disable
    ports:
      - "8080:8080"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  soha-postgres-data:
    name: soha-postgres-data
  soha-k3s-data:
    name: soha-k3s-data
