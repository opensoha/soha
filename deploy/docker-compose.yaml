name: soha

services:
  postgres:
    # PostgreSQL 18 stores PGDATA below /var/lib/postgresql/18/docker.
    # Mount the parent directory so the named volume owns the real data path.
    image: ${SOHA_POSTGRES_IMAGE:-pgvector/pgvector:0.8.5-pg18-trixie}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - compute_query_id=on
    container_name: ${SOHA_POSTGRES_CONTAINER_NAME:-pgsql}
    environment:
      POSTGRES_DB: soha
      POSTGRES_USER: pgsql
      POSTGRES_PASSWORD: ${SOHA_DATABASE_PASSWORD:-pgsql}
    ports:
      - "${SOHA_POSTGRES_BIND:-127.0.0.1}:${SOHA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - soha-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgsql -d soha"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: ${SOHA_REDIS_CONTAINER_NAME:-soha-redis}
    profiles:
      - redis-rate-limit
    ports:
      - "${SOHA_REDIS_BIND:-0.0.0.0}:${SOHA_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  soha:
    container_name: ${SOHA_CONTAINER_NAME:-soha}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      additional_contexts:
        contracts: ${SOHA_CONTRACTS_DIR:-../../soha-contracts}
    image: ${SOHA_IMAGE:-yshanchui/soha:local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SOHA_CONFIG_FILE: /app/configs/config.yaml
      SOHA_DATABASE_HOST: postgres
      SOHA_DATABASE_PASSWORD: ${SOHA_DATABASE_PASSWORD:-pgsql}
      SOHA_AUTH_DEV_PRINCIPAL_PASSWORD: ${SOHA_AUTH_DEV_PRINCIPAL_PASSWORD:-opensoha}
      SOHA_AUTH_JWT_SECRET: ${SOHA_AUTH_JWT_SECRET:-soha-123456789012345678901234567890}
      SOHA_RUNTIME_EXECUTION_RUNNER_TOKEN: ${SOHA_RUNTIME_EXECUTION_RUNNER_TOKEN:-soha-123456789012345678901234567890}
      SOHA_MONITORING_WEBHOOK_TOKEN: ${SOHA_MONITORING_WEBHOOK_TOKEN:-soha-123456789012345678901234567890}
      SOHA_SECURITY_CREDENTIAL_ENCRYPTION_KEY: ${SOHA_SECURITY_CREDENTIAL_ENCRYPTION_KEY:-soha-123456789012345678901234567890}
    ports:
      - "${SOHA_HTTP_BIND:-127.0.0.1}:${SOHA_HTTP_PORT:-8080}:8080"
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  hermes-agent-setup:
    image: nousresearch/hermes-agent:latest
    profiles:
      - hermes-setup
    command: setup
    stdin_open: true
    tty: true
    volumes:
      - soha-hermes-data:/opt/data

  hermes-agent-runner:
    profiles:
      - hermes
    build:
      context: ${SOHA_AGENT_DIR:-../../soha-agent}
      dockerfile: deploy/Dockerfile.hermes-agent-runner
      additional_contexts:
        contracts: ${SOHA_CONTRACTS_DIR:-../../soha-contracts}
    image: ${SOHA_HERMES_IMAGE:-yshanchui/soha-hermes-agent:local}
    container_name: ${SOHA_HERMES_CONTAINER_NAME:-soha-hermes-agent-runner}
    restart: unless-stopped
    depends_on:
      soha:
        condition: service_healthy
    environment:
      SOHA_AGENT_CONFIG_FILE: /app/configs/agent.config.yaml
      SOHA_AGENT_APP_ENV: production
      SOHA_AGENT_HTTP_ADDR: :18080
      SOHA_AGENT_AUTH_BEARER_TOKEN: ${SOHA_RUNTIME_EXECUTION_RUNNER_TOKEN:-soha-123456789012345678901234567890}
      SOHA_AGENT_CONTROL_PLANE_ENABLED: "true"
      SOHA_AGENT_CONTROL_PLANE_BASE_URL: ${SOHA_CONTROL_PLANE_URL:-http://soha:8080}
      SOHA_AGENT_CONTROL_PLANE_BEARER_TOKEN: ${SOHA_RUNTIME_EXECUTION_RUNNER_TOKEN:-soha-123456789012345678901234567890}
      SOHA_AGENT_CONTROL_PLANE_AGENT_ID: ${SOHA_HERMES_AGENT_ID:-hermes-agent-runner}
      SOHA_AGENT_CONTROL_PLANE_PROVIDER_KINDS: agent_runtime_only
      SOHA_AGENT_CONTROL_PLANE_RUNTIME_ENDPOINT: ${SOHA_HERMES_RUNTIME_ENDPOINT:-http://soha-hermes-agent-runner:18080}
      SOHA_AGENT_CONTROL_PLANE_DOCKER_ENABLED: "false"
      SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_ENABLED: "true"
      SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_WORKER_ID: ${SOHA_HERMES_WORKER_ID:-hermes-agent-runner}
      SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_PROVIDER_IDS: hermes
      SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_PROVIDER_KINDS: hermes
      SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_HERMES_COMMAND: hermes
      SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_WORKSPACE_ROOT: /var/lib/soha-agent-runtime
      SOHA_AGENT_KUBERNETES_ENABLED: "false"
    ports:
      - "${SOHA_HERMES_BIND:-0.0.0.0}:${SOHA_HERMES_PORT:-18080}:18080"
    volumes:
      - soha-hermes-data:/opt/data
      - soha-hermes-runtime:/var/lib/soha-agent-runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  soha-postgres-data:
    name: ${SOHA_POSTGRES_VOLUME:-soha-postgres-data}
  soha-hermes-data:
    name: ${SOHA_HERMES_DATA_VOLUME:-soha-hermes-data}
  soha-hermes-runtime:
    name: ${SOHA_HERMES_RUNTIME_VOLUME:-soha-hermes-runtime}
