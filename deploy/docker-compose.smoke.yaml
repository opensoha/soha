services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: soha
      POSTGRES_USER: pgsql
      POSTGRES_PASSWORD: pgsql
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgsql -d soha"]
      interval: 5s
      timeout: 5s
      retries: 20

  soha:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      additional_contexts:
        contracts: ${SOHA_CONTRACTS_DIR:-../../soha-contracts}
    image: ${SOHA_SMOKE_IMAGE:-soha:local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SOHA_CONFIG_FILE: /app/configs/config.compose.yaml
      SOHA_DATABASE_HOST: postgres
      SOHA_DATABASE_PORT: "5432"
      SOHA_DATABASE_NAME: soha
      SOHA_DATABASE_USER: pgsql
      SOHA_DATABASE_PASSWORD: pgsql
      SOHA_DATABASE_SSLMODE: disable
      SOHA_AI_GATEWAY_RATE_LIMIT_BACKEND: postgres
    ports:
      - "127.0.0.1:${SOHA_SMOKE_HTTP_PORT:-28080}:8080"
    volumes:
      - ../configs/config.compose.yaml:/app/configs/config.compose.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
