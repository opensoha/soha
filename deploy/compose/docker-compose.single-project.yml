services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kubecrux
      POSTGRES_USER: pgsql
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - kubecrux-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgsql -d kubecrux"]
      interval: 5s
      timeout: 5s
      retries: 20

  kubecrux:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.single-project
    image: kubecrux:single-project
    environment:
      KC_CONFIG_FILE: /app/configs/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../config/config.api.single-project.yaml:/app/configs/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  kubecrux-postgres-data:
