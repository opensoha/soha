image:
  repository: ghcr.io/example/soha
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: soha.example.com
  tls: false
  tlsSecretName: ""

postgres:
  # PostgreSQL 18 stores PGDATA below /var/lib/postgresql/18/docker.
  # Keep the persistent volume mounted at /var/lib/postgresql in templates.
  image: postgres:18.4
  database: soha
  username: pgsql
  password: change-me
  storageSize: 10Gi

config:
  appEnv: production
  loggerLevel: info
  loggerFormat: json
  basePath: /api/v1
  corsAllowedOrigins:
    - https://soha.example.com
  runtime:
    workflowWorkers: 4
    workflowQueueSize: 64
    workflowNodeParallelism: 4
    clusterSyncParallelism: 4
    copilotInspectionParallelism: 2
    alertUpsertBatchSize: 100
  auth:
    enableDevAuth: false
    adminUserId: admin
    adminName: Admin
    adminEmail: admin@soha.local
    adminPassword: change-me
    adminRoles:
      - admin
      - ops
      - auditor
    jwtIssuer: soha
    jwtSecret: change-me
    accessTTL: 15m
    refreshTTL: 168h
    oidc:
      enabled: false
      providerName: default
      issuer: ""
      clientId: ""
      clientSecret: ""
      redirectUrl: https://soha.example.com/api/v1/auth/oidc/callback
      frontendRedirectUrl: https://soha.example.com/login/callback
      scopes:
        - openid
        - profile
        - email
      defaultRoles:
        - readonly
  monitoring:
    enabled: true
    webhookToken: change-me
    prometheusUrl: ""
    prometheusBearerToken: ""
    prometheusDefaultRangeMinutes: 60
    prometheusStepSeconds: 60
    prometheusClusterLabel: cluster
    grafanaBaseUrl: ""
  modules:
    delivery:
      enabled: true
    monitoring:
      enabled: true
    ai:
      enabled: true
    aiGateway:
      enabled: true
    security:
      enabled: false
    cmdb:
      enabled: false
  swaggerEnabled: false
  mcpEnabled: true
  aiGateway:
    rateLimit:
      backend: postgres
      redis:
        addr: ""
        username: ""
        password: ""
        db: 0
        tls: false
        keyPrefix: soha:ai-gateway:rate-limit
        timeout: 500ms
  seedDefaults: true
