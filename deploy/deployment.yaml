apiVersion: v1
kind: Namespace
metadata:
  name: soha
---
apiVersion: v1
kind: Secret
metadata:
  name: soha-app-config
  namespace: soha
type: Opaque
stringData:
  postgres-password: pgsql
  auth-dev-principal-password: opensoha
  auth-jwt-secret: soha-1234567890123456789012345678901234567890
  runtime-execution-runner-token: soha-1234567890123456789012345678901234567890
  monitoring-webhook-token: soha-1234567890123456789012345678901234567890
  security-credential-encryption-key: soha-1234567890123456789012345678901234567890
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soha-postgres-data
  namespace: soha
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha-postgres
  namespace: soha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soha-postgres
  template:
    metadata:
      labels:
        app: soha-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.4
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: soha
            - name: POSTGRES_USER
              value: pgsql
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: soha-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: soha-postgres
  namespace: soha
spec:
  selector:
    app: soha-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha
  namespace: soha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soha
  template:
    metadata:
      labels:
        app: soha
    spec:
      containers:
        - name: soha
          image: yshanchui/soha:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SOHA_CONFIG_FILE
              value: /app/configs/config.yaml
            - name: SOHA_DATABASE_HOST
              value: soha-postgres
            - name: SOHA_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: postgres-password
            - name: SOHA_AUTH_DEV_PRINCIPAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: auth-dev-principal-password
            - name: SOHA_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: auth-jwt-secret
            - name: SOHA_RUNTIME_EXECUTION_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: runtime-execution-runner-token
            - name: SOHA_MONITORING_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: monitoring-webhook-token
            - name: SOHA_SECURITY_CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: security-credential-encryption-key
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: soha
  namespace: soha
spec:
  selector:
    app: soha
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soha
  namespace: soha
spec:
  ingressClassName: nginx
  rules:
    - host: soha.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soha
                port:
                  number: 8080
