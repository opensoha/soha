apiVersion: v1
kind: Namespace
metadata:
  name: soha
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soha-postgres-data
  namespace: soha
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha-postgres
  namespace: soha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soha-postgres
  template:
    metadata:
      labels:
        app: soha-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.4
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: soha
            - name: POSTGRES_USER
              value: pgsql
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: soha-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: soha-postgres
  namespace: soha
spec:
  selector:
    app: soha-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha
  namespace: soha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soha
  template:
    metadata:
      labels:
        app: soha
    spec:
      containers:
        - name: soha
          image: yshanchui/soha:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SOHA_CONFIG_FILE
              value: /app/configs/config.yaml
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: app-config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: app-config
          secret:
            secretName: soha-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: soha
  namespace: soha
spec:
  selector:
    app: soha
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soha
  namespace: soha
spec:
  ingressClassName: nginx
  rules:
    - host: soha.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soha
                port:
                  number: 8080
