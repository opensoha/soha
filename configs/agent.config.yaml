app:
  name: kubecrux-agent
  env: development

http:
  addr: :18080
  base_path: /api/v1
  read_timeout: 15s
  write_timeout: 15s

logger:
  level: debug
  format: console

auth:
  bearer_token: demo-agent-token

control_plane:
  enabled: true
  base_url: http://127.0.0.1:8080
  bearer_token: demo-execution-runner-token
  agent_id: local-agent
  runtime_endpoint: http://127.0.0.1:18080
  poll_interval: 5s
  provider_kinds:
    - ci_agent_runner
  workspace_root: .
  docker:
    enabled: true
    worker_id: local-docker-runner
    host_ids: []
    operation_kinds:
      - container_start
      - project_deploy
      - service_action
      - port_reserve
      - host_sync
    compose_root: ./.kubecrux/docker
    poll_interval: 5s

kubernetes:
  id: local-agent
  name: Local Agent
  kubeconfig: $HOME/.kube/config
  context: ""
  region: local
  environment: development
  labels:
    provider: agent
    owner: platform
