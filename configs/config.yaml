app:
  name: kubecrux
  env: development

http:
  addr: :8080
  base_path: /api/v1
  read_timeout: 15s
  write_timeout: 15s
  cors_allowed_origins:
    - http://localhost:*
    - http://127.0.0.1:*

logger:
  level: debug
  format: console

runtime:
  workflow_workers: 4
  workflow_queue_size: 64
  workflow_node_parallelism: 4
  cluster_sync_parallelism: 4
  copilot_inspection_parallelism: 2
  alert_upsert_batch_size: 100
  execution_runner_token: demo-execution-runner-token
  execution_job_cluster_id: ""
  execution_job_namespace: kubecrux-system
  execution_job_image: alpine:3.20
  execution_job_git_image: alpine/git:2.47.0
  execution_job_ttl_seconds: 3600

database:
  driver: postgres
  host: localhost
  port: 5432
  name: kubecrux
  user: pgsql
  password: pgsql
  sslmode: disable
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 1h
  auto_migrate: true
  migration_file: migrations/postgres/0001_init.sql

auth:
  enable_dev_auth: false
  dev_principal:
    user_id: admin
    name: Admin
    email: admin@kubecrux.local
    password: kubecrux
    roles:
      - admin
      - ops
      - auditor
  jwt:
    issuer: kubecrux
    secret: dev-only-change-me
    access_ttl: 15m
    refresh_ttl: 168h
  oidc:
    enabled: false
    provider_name: default
    issuer: ""
    client_id: ""
    client_secret: ""
    redirect_url: http://localhost:8080/api/v1/auth/oidc/callback
    frontend_redirect_url: http://localhost:5173/login/callback
    scopes:
      - openid
      - profile
      - email
    default_roles:
      - readonly

gitlab:
  enabled: false
  base_url: https://gitlab.com/api/v4
  token: ""
  group_id: ""
  per_page: 50
  timeout: 10s

monitoring:
  enabled: true
  webhook_token: dev-alert-webhook-token
  prometheus_url: ""
  prometheus_bearer_token: ""
  prometheus_default_range_minutes: 60
  prometheus_step_seconds: 60
  prometheus_cluster_label: cluster
  grafana_base_url: ""

swagger:
  enabled: true
  path: /swagger/*any

mcp:
  enabled: true
  default_timeout: 10s

modules:
  delivery:
    enabled: true
  monitoring:
    enabled: true
  ai:
    enabled: true
  virtualization:
    enabled: true
  docker:
    enabled: true
  security:
    enabled: false
  cmdb:
    enabled: false

security:
  credential_encryption_key: ${KC_SECURITY_CREDENTIAL_ENCRYPTION_KEY}
  secret_provider: ${KC_SECURITY_SECRET_PROVIDER}

bootstrap:
  seed_defaults: true

kubernetes:
  clusters:
    - id: local-k3s
      name: Local K3s
      kubeconfig: ./.dev/k3s/kubeconfig.yaml
      region: local
      environment: development
      labels:
        provider: k3s
        purpose: debug
