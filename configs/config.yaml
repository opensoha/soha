app:
  name: soha

http:
  addr: :8080
  base_path: /api/v1
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 120s
  max_header_bytes: 1048576
  trusted_proxies: []
  cors_allowed_origins:
    - http://localhost:*
    - http://127.0.0.1:*

logger:
  level: info
  format: console

runtime:
  workflow_workers: 4
  workflow_queue_size: 64
  workflow_node_parallelism: 4
  cluster_sync_parallelism: 4
  copilot_inspection_parallelism: 2
  alert_upsert_batch_size: 100
  virtualization_startup_sync_enabled: true
  virtualization_worker_interval: 2s
  virtualization_sync_concurrency: 1
  # Public zero-config default. Override before exposing an installation publicly.
  execution_runner_token: soha-123456789012345678901234567890
  execution_job_cluster_id: ""
  execution_job_namespace: soha-system
  execution_job_image: alpine:3.20
  execution_job_git_image: alpine/git:2.47.0
  execution_job_ttl_seconds: 3600

database:
  driver: postgres
  host: localhost
  port: 5432
  name: soha
  user: pgsql
  # Standard initial credential. Override it when the installation requires one.
  password: pgsql
  sslmode: disable
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 1h
  auto_migrate: true
  migration_file: migrations/postgres/0001_init.sql

auth:
  enable_dev_auth: false
  login_verification:
    slider_enabled: true
  dev_principal:
    name: OpenSoha
    email: opensoha@soha.local
    # Standard initial credential; routine restarts never overwrite a changed password.
    password: opensoha
    roles:
      - admin
      - ops
      - auditor
  jwt:
    issuer: soha
    # Public zero-config default. Override before exposing an installation publicly.
    secret: soha-123456789012345678901234567890
    access_ttl: 15m
    refresh_ttl: 168h
gitlab:
  enabled: false
  base_url: https://gitlab.com/api/v4
  token: ""
  group_id: ""
  per_page: 50
  timeout: 10s

monitoring:
  enabled: true
  # Public zero-config default. Override before exposing an installation publicly.
  webhook_token: soha-123456789012345678901234567890

swagger:
  enabled: true
  path: /swagger/*any

mcp:
  enabled: true
  default_timeout: 10s

ai_gateway:
  # Relay calls have an overall deadline plus bounded first-byte and stream-idle waits.
  relay:
    default_timeout: 120s
    stream_timeout: 300s
    first_byte_timeout: 30s
    stream_idle_timeout: 60s
  rate_limit:
    # postgres uses durable fixed-window/GCRA tables. Set to redis for a high-throughput shared limiter.
    backend: postgres
    redis:
      addr: ""
      username: ""
      password: ""
      db: 0
      tls: false
      key_prefix: soha:ai-gateway:rate-limit
      timeout: 500ms
  connector_runtime:
    endpoint: ""
    token: ""
    plugin_id: ""
    connector_id: ""
  connector_runtimes: []
  connector_event_sink:
    token: ""

plugins:
  marketplace:
    # Local development marketplace. Override with
    # https://marketplace.opensoha.com/marketplace/index.json in deployed environments.
    url: http://127.0.0.1:8081/marketplace/index.json
    source_id: opensoha-local
    sources: []

modules:
  home:
    enabled: true
  delivery:
    enabled: true
  monitoring:
    enabled: true
  ai:
    enabled: true
    features:
      assistant.global: true
      knowledge.external_connectors: true
      knowledge.async_ingestion: true
      knowledge.gateway_embedding: true
      knowledge.gateway_rerank: true
      agent.fleet_rollout: true
      agent.environment_management: true
      agent.conformance_suite: true
      evaluation.candidate_executor: true
      evaluation.isolated_replay: true
      evaluation.feedback_sampling: true
      evaluation.release_gate: true
      memory.long_term: false
      retrieval.agentic: false
      retrieval.graphrag: false
      agent.multi_agent: false
      ai.production_operations: true
  ai_gateway:
    enabled: true
  virtualization:
    enabled: true
  docker:
    enabled: true
  security:
    enabled: true
  cmdb:
    enabled: false

assets:
  web:
    mode: embed
    dir: internal/staticassets/web/dist
    proxy_url: http://localhost:5173
  docs:
    mode: external
    dir: ../soha-docs/build
    proxy_url: http://localhost:3000
    external_url: https://docs.opensoha.dev/

security:
  # Public zero-config default. Changing this after credentials are stored requires
  # re-encrypting those records with the new key before restarting Soha.
  credential_encryption_key: soha-123456789012345678901234567890
  secret_provider: ""

bootstrap:
  seed_defaults: true

kubernetes:
  clusters: []
