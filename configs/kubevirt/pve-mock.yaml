apiVersion: v1
kind: Namespace
metadata:
  name: virt-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pve-mock
  namespace: virt-lab
data:
  server.py: |
    import json
    import time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import parse_qs, urlparse

    NODE = "pve-mock-1"
    next_id = 9002
    vms = {
        "9000": {"vmid": 9000, "name": "kc-lab-template", "status": "stopped", "template": 1, "cpus": 2, "maxmem": 2147483648},
        "9001": {"vmid": 9001, "name": "kc-lab-demo", "status": "running", "cpus": 2, "maxmem": 4294967296},
    }

    def envelope(data):
        return json.dumps({"data": data}).encode("utf-8")

    def parse_body(handler):
        length = int(handler.headers.get("content-length", "0") or "0")
        if length <= 0:
            return {}
        raw = handler.rfile.read(length).decode("utf-8")
        try:
            return json.loads(raw)
        except json.JSONDecodeError:
            return {key: values[-1] for key, values in parse_qs(raw).items()}

    class Handler(BaseHTTPRequestHandler):
        server_version = "kubecrux-pve-mock/0.1"

        def log_message(self, fmt, *args):
            print("%s - %s" % (self.address_string(), fmt % args), flush=True)

        def send_json(self, data, status=200):
            payload = envelope(data)
            self.send_response(status)
            self.send_header("content-type", "application/json")
            self.send_header("content-length", str(len(payload)))
            self.end_headers()
            self.wfile.write(payload)

        def parts(self):
            path = urlparse(self.path).path
            prefix = "/api2/json/"
            if path.startswith(prefix):
                path = path[len(prefix):]
            return [part for part in path.split("/") if part]

        def do_GET(self):
            parts = self.parts()
            if parts == ["version"]:
                return self.send_json({"version": "9.2-1", "release": "mock"})
            if parts == ["nodes"]:
                return self.send_json([{"node": NODE, "status": "online", "cpu": 0.12, "mem": 2147483648, "maxmem": 17179869184}])
            if parts == ["cluster", "nextid"]:
                global next_id
                return self.send_json(str(next_id))
            if len(parts) >= 3 and parts[:2] == ["nodes", NODE] and parts[2] == "qemu":
                if len(parts) == 3:
                    return self.send_json(list(vms.values()))
                vmid = parts[3]
                if len(parts) == 5 and parts[4] == "rrddata":
                    now = int(time.time())
                    return self.send_json([
                        {"time": now - 120, "cpu": 0.08, "mem": 536870912, "netin": 2048, "netout": 4096},
                        {"time": now - 60, "cpu": 0.12, "mem": 671088640, "netin": 4096, "netout": 8192},
                        {"time": now, "cpu": 0.10, "mem": 734003200, "netin": 6144, "netout": 12288},
                    ])
                if len(parts) == 6 and parts[4:6] == ["status", "current"]:
                    vm = vms.get(vmid, {"vmid": int(vmid), "name": "kc-lab-" + vmid, "status": "stopped"})
                    return self.send_json(vm)
            if parts == ["nodes", NODE, "storage"]:
                return self.send_json([
                    {"storage": "local", "type": "dir", "content": "iso,vztmpl,backup"},
                    {"storage": "local-lvm", "type": "lvmthin", "content": "images,rootdir"},
                ])
            if parts == ["nodes", NODE, "storage", "local", "content"]:
                return self.send_json([
                    {"volid": "local:iso/debian-12.iso", "content": "iso", "size": 734003200},
                    {"volid": "local:vztmpl/kc-lab-ubuntu-template.tar.zst", "content": "vztmpl", "size": 536870912},
                ])
            return self.send_json({"error": "not found", "path": self.path}, 404)

        def do_POST(self):
            global next_id
            parts = self.parts()
            body = parse_body(self)
            if len(parts) == 3 and parts[:2] == ["nodes", NODE] and parts[2] == "qemu":
                vmid = str(body.get("vmid") or next_id)
                next_id = max(next_id, int(vmid) + 1)
                vms[vmid] = {"vmid": int(vmid), "name": body.get("name", "kc-lab-" + vmid), "status": "stopped", "cpus": body.get("cores", 1), "maxmem": 2147483648}
                return self.send_json("UPID:pve-mock:create:%s" % vmid)
            if len(parts) == 5 and parts[:2] == ["nodes", NODE] and parts[2] == "qemu" and parts[4] == "clone":
                newid = str(body.get("newid") or next_id)
                next_id = max(next_id, int(newid) + 1)
                vms[newid] = {"vmid": int(newid), "name": body.get("name", "kc-lab-clone-" + newid), "status": "stopped", "cpus": 2, "maxmem": 2147483648}
                return self.send_json("UPID:pve-mock:clone:%s" % newid)
            if len(parts) == 6 and parts[:2] == ["nodes", NODE] and parts[2] == "qemu" and parts[4] == "status":
                vmid = parts[3]
                action = parts[5]
                vm = vms.setdefault(vmid, {"vmid": int(vmid), "name": "kc-lab-" + vmid, "status": "stopped"})
                if action == "start":
                    vm["status"] = "running"
                elif action == "stop":
                    vm["status"] = "stopped"
                elif action == "reboot":
                    vm["status"] = "running"
                return self.send_json("UPID:pve-mock:%s:%s" % (action, vmid))
            if len(parts) == 5 and parts[:2] == ["nodes", NODE] and parts[2] == "qemu" and parts[4] == "vncproxy":
                return self.send_json({"ticket": "PVEVNC:mock-ticket", "port": 5900})
            return self.send_json({"error": "not found", "path": self.path}, 404)

        def do_DELETE(self):
            parts = self.parts()
            if len(parts) == 4 and parts[:2] == ["nodes", NODE] and parts[2] == "qemu":
                vms.pop(parts[3], None)
                return self.send_json("UPID:pve-mock:delete:%s" % parts[3])
            return self.send_json({"error": "not found", "path": self.path}, 404)

    ThreadingHTTPServer(("0.0.0.0", 8006), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-mock
  namespace: virt-lab
  labels:
    app.kubernetes.io/name: pve-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-mock
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pve-mock
    spec:
      containers:
        - name: pve-mock
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          ports:
            - name: pve-api
              containerPort: 8006
          volumeMounts:
            - name: pve-mock
              mountPath: /app
      volumes:
        - name: pve-mock
          configMap:
            name: pve-mock
---
apiVersion: v1
kind: Service
metadata:
  name: pve-mock
  namespace: virt-lab
  labels:
    app.kubernetes.io/name: pve-mock
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: pve-mock
  ports:
    - name: pve-api
      port: 8006
      targetPort: 8006
      nodePort: 30006
      protocol: TCP
