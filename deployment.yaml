apiVersion: v1
kind: Namespace
metadata:
  name: soha
---
apiVersion: v1
kind: Secret
metadata:
  name: soha-app-config
  namespace: soha
type: Opaque
stringData:
  postgres-password: change-me
  config.yaml: |
    app:
      name: soha
      env: production
    http:
      addr: :8080
      base_path: /api/v1
      read_timeout: 15s
      write_timeout: 15s
      cors_allowed_origins:
        - https://soha.example.com
    logger:
      level: info
      format: json
    runtime:
      workflow_workers: 4
      workflow_queue_size: 64
      workflow_node_parallelism: 4
      cluster_sync_parallelism: 4
      copilot_inspection_parallelism: 2
      alert_upsert_batch_size: 100
    database:
      driver: postgres
      host: soha-postgres
      port: 5432
      name: soha
      user: pgsql
      password: change-me
      sslmode: disable
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime: 1h
      auto_migrate: true
      migration_file: /app/migrations/postgres/0001_init.sql
    auth:
      enable_dev_auth: false
      dev_principal:
        user_id: admin
        name: Admin
        email: admin@soha.local
        password: change-me
        roles:
          - admin
          - ops
          - auditor
      jwt:
        issuer: soha
        secret: change-me
        access_ttl: 15m
        refresh_ttl: 168h
      oidc:
        enabled: false
        provider_name: default
        issuer: ""
        client_id: ""
        client_secret: ""
        redirect_url: https://soha.example.com/api/v1/auth/oidc/callback
        frontend_redirect_url: https://soha.example.com/login/callback
        scopes:
          - openid
          - profile
          - email
        default_roles:
          - readonly
    gitlab:
      enabled: false
      base_url: https://gitlab.com/api/v4
      token: ""
      group_id: ""
      per_page: 50
      timeout: 10s
    monitoring:
      enabled: true
      webhook_token: change-me
      prometheus_url: ""
      prometheus_bearer_token: ""
      prometheus_default_range_minutes: 60
      prometheus_step_seconds: 60
      prometheus_cluster_label: cluster
      grafana_base_url: ""
    swagger:
      enabled: false
      path: /swagger/*any
    mcp:
      enabled: true
      default_timeout: 10s
    bootstrap:
      seed_defaults: true
    kubernetes:
      clusters: []
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soha-postgres-data
  namespace: soha
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha-postgres
  namespace: soha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soha-postgres
  template:
    metadata:
      labels:
        app: soha-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.4
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: soha
            - name: POSTGRES_USER
              value: pgsql
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soha-app-config
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: soha-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: soha-postgres
  namespace: soha
spec:
  selector:
    app: soha-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha
  namespace: soha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soha
  template:
    metadata:
      labels:
        app: soha
    spec:
      containers:
        - name: soha
          image: ghcr.io/example/soha:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SOHA_CONFIG_FILE
              value: /app/configs/config.yaml
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: app-config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: app-config
          secret:
            secretName: soha-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: soha
  namespace: soha
spec:
  selector:
    app: soha
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soha
  namespace: soha
spec:
  ingressClassName: nginx
  rules:
    - host: soha.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soha
                port:
                  number: 8080
