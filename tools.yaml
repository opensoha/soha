sources:
  kubecrux_pg:
    kind: postgres
    host: ${POSTGRES_HOST}
    port: ${POSTGRES_PORT}
    database: ${POSTGRES_DATABASE}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

tools:
  list_tables:
    kind: postgres-sql
    source: kubecrux_pg
    description: 列出 public schema 下的表
    statement: |
      SELECT schemaname, tablename
      FROM pg_tables
      WHERE schemaname NOT IN ('pg_catalog', 'information_schema')
      ORDER BY schemaname, tablename;

  describe_table:
    kind: postgres-sql
    source: kubecrux_pg
    description: 查看指定表的字段、类型、是否可空、默认值
    parameters:
      - name: schema_name
        type: string
        description: schema 名，通常为 public
      - name: table_name
        type: string
        description: 表名
    statement: |
      SELECT
        column_name,
        data_type,
        is_nullable,
        column_default
      FROM information_schema.columns
      WHERE table_schema = $1
        AND table_name = $2
      ORDER BY ordinal_position;

  execute_sql:
    kind: postgres-sql
    source: kubecrux_pg
    description: |
      执行 PostgreSQL SQL。允许 SELECT / INSERT / UPDATE / DELETE / DDL。
      仅对明确目标执行，修改前先检查表结构，危险操作需谨慎。
    parameters:
      - name: sql
        type: string
        description: 要执行的 SQL 语句
    statement: |
      {{.sql}}

  preview_table_data:
    kind: postgres-sql
    source: kubecrux_pg
    description: 预览指定表前 20 行数据
    parameters:
      - name: schema_name
        type: string
        description: schema 名，通常为 public
      - name: table_name
        type: string
        description: 表名
    statement: |
      SELECT *
      FROM {{.schema_name}}.{{.table_name}}
      LIMIT 20;
