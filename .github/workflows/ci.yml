name: soha-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout soha
        uses: actions/checkout@v7
        with:
          path: soha
      - name: Checkout contracts
        uses: actions/checkout@v7
        with:
          repository: opensoha/soha-contracts
          path: soha-contracts
          token: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
      - name: Checkout web
        uses: actions/checkout@v7
        with:
          repository: opensoha/soha-web
          path: soha-web
          token: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: soha-web/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: soha/go.sum
      - name: Check Go module state
        working-directory: soha
        run: |
          GOWORK=off go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Verify Go module checksums
        working-directory: soha
        run: GOWORK=off go mod verify
      - name: Build web artifact
        working-directory: soha-web
        run: |
          npm ci
          npm run build
      - name: Stage embedded web artifact
        working-directory: soha
        run: |
          rm -rf internal/staticassets/web/dist
          mkdir -p internal/staticassets/web/dist
          cp -R ../soha-web/dist/. internal/staticassets/web/dist/
      - name: Test
        working-directory: soha
        run: GOWORK=off go test ./...
      - name: Race test
        working-directory: soha
        run: GOWORK=off go test -race ./...
      - name: Vet
        working-directory: soha
        run: GOWORK=off go vet ./...
      - name: Govulncheck
        working-directory: soha
        run: GOWORK=off go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - name: Golangci-lint
        if: github.event_name == 'pull_request'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          working-directory: soha
          only-new-issues: true
          args: --timeout=5m
      - name: Build embedded server
        working-directory: soha
        run: GOWORK=off CGO_ENABLED=0 go build -tags embedassets -o /tmp/soha ./cmd/server
      - name: Docker build
        working-directory: soha
        run: docker build --build-context contracts=../soha-contracts -f deploy/Dockerfile -t yshanchui/soha:test -t yshanchui/soha:local .
